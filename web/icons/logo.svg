<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" fill="none">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FF6B35"/>
      <stop offset="100%" style="stop-color:#E84525"/>
    </linearGradient>
    <linearGradient id="claw" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FFFFFF"/>
      <stop offset="100%" style="stop-color:#FFE0D0"/>
    </linearGradient>
  </defs>
  <!-- Rounded square background -->
  <rect width="512" height="512" rx="96" fill="url(#bg)"/>
  <!-- Claw shape: two pincers -->
  <g transform="translate(256, 240)">
    <!-- Left pincer -->
    <path d="M-20,-40 C-20,-100 -80,-140 -120,-120 C-145,-108 -150,-75 -130,-55 L-50,-10"
          stroke="url(#claw)" stroke-width="32" stroke-linecap="round" fill="none"/>
    <!-- Right pincer -->
    <path d="M20,-40 C20,-100 80,-140 120,-120 C145,-108 150,-75 130,-55 L50,-10"
          stroke="url(#claw)" stroke-width="32" stroke-linecap="round" fill="none"/>
    <!-- Base/palm -->
    <path d="M-50,-10 Q-30,30 0,40 Q30,30 50,-10"
          stroke="url(#claw)" stroke-width="32" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
    <!-- Small dot representing "me" / connection point -->
    <circle cx="0" cy="90" r="16" fill="#FFFFFF" opacity="0.9"/>
    <circle cx="0" cy="90" r="8" fill="#FF6B35"/>
    <!-- Signal arcs -->
    <path d="M-25,75 Q-25,55 0,55 Q25,55 25,75" stroke="#FFFFFF" stroke-width="4" fill="none" opacity="0.6"/>
    <path d="M-40,70 Q-40,40 0,40 Q40,40 40,70" stroke="#FFFFFF" stroke-width="4" fill="none" opacity="0.4"/>
  </g>
  <!-- Text: ClawMe -->
  <text x="256" y="420" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif"
        font-size="64" font-weight="800" fill="#FFFFFF" letter-spacing="-2">
    ClawMe
  </text>
</svg>

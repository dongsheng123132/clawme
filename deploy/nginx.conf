server {
    listen 80;
    server_name clawme.net www.clawme.net;
    return 301 https://clawme.net$request_uri;
}

server {
    listen 443 ssl http2;
    server_name clawme.net www.clawme.net;

    ssl_certificate     /etc/letsencrypt/live/clawme.net/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/clawme.net/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;

    # --- Static website (landing page + PWA) ---
    root /opt/clawme/web;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
    }

    # --- API reverse proxy → ClawMe backend ---
    location /v1/ {
        proxy_pass http://127.0.0.1:31871;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /health {
        proxy_pass http://127.0.0.1:31871;
    }

    # --- PWA headers ---
    location /manifest.json {
        add_header Cache-Control "no-cache";
    }
    location /js/sw.js {
        add_header Cache-Control "no-cache";
        add_header Service-Worker-Allowed "/";
    }

    # --- Gzip ---
    gzip on;
    gzip_types text/plain text/css application/json application/javascript image/svg+xml;
}

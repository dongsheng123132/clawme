<!DOCTYPE html>
<html><head><meta charset="utf-8">
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body { width:440px; height:280px; overflow:hidden; font-family:system-ui,-apple-system,sans-serif; }
.card {
  width:440px; height:280px;
  background: linear-gradient(135deg, #FF6B35, #E84525);
  display:flex; flex-direction:column; align-items:center; justify-content:center;
  color:#fff; text-align:center; padding:20px;
}
h1 { font-size:48px; font-weight:900; letter-spacing:-2px; margin-bottom:8px; }
.tagline { font-size:16px; opacity:0.9; margin-bottom:20px; }
.pills { display:flex; gap:8px; flex-wrap:wrap; justify-content:center; margin-bottom:16px; }
.pill { padding:4px 12px; border-radius:12px; background:rgba(255,255,255,0.2); font-size:12px; font-weight:600; }
.bottom { font-size:12px; opacity:0.7; }
</style></head>
<body><div class="card">
  <h1>🦞 ClawMe</h1>
  <div class="tagline">The Butler Between AI Agents & You</div>
  <div class="pills">
    <span class="pill">Fill Forms</span>
    <span class="pill">Tweet</span>
    <span class="pill">Email</span>
    <span class="pill">Click</span>
    <span class="pill">Extract</span>
    <span class="pill">Workflow</span>
  </div>
  <div class="bottom">AI gives instructions. You confirm. Browser executes.</div>
</div></body></html>
